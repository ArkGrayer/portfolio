<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="src/assets/svg/Igor-Logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>portfolio</title>
    <style>
      /* Previne o piscar branco antes do React inicializar */
      body {
        background-color: #050607;
        margin: 0;
        padding: 0;
      }
      /* Cortina de loading ABSOLUTA desde o milissegundo zero */
      .screen-load {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #050607;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      /* Previne o SVG gigante no mobile antes do CSS carregar */
      .screen-load svg {
        width: 200px;
        height: 200px;
      }
      @media screen and (max-width: 960px) {
        .screen-load svg {
          width: 100px;
          height: 100px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
